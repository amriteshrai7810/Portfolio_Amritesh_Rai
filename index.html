<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Amritesh Rai | Data Analyst Portfolio</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Data Analyst portfolio showcasing SQL, Power BI, Python, and Excel projects with business insights and analytics."
    />
    <meta name="author" content="Amritesh Rai" />

    <!-- Open Graph (Clean - No Image) -->
    <meta property="og:title" content="Amritesh Rai | Data Analyst Portfolio" />
    <meta
      property="og:description"
      content="Data Analyst portfolio showcasing SQL, Power BI, Python, and Excel projects with business insights and analytics."
    />
    <meta property="og:type" content="website" />

    <!-- Twitter (Clean - No Image) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Amritesh Rai | Data Analyst Portfolio" />
    <meta
      name="twitter:description"
      content="Data Analyst portfolio showcasing SQL, Power BI, Python, and Excel projects with business insights and analytics."
    />

    <!-- Dark Mode Default Script -->
    <script>
      (function () {
        const theme = localStorage.getItem("theme");

        if (theme === "light") {
          document.documentElement.classList.remove("dark");
        } else {
          document.documentElement.classList.add("dark");
          if (!theme) localStorage.setItem("theme", "dark");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
